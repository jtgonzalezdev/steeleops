databases:
  - name: steeleops-db
    databaseName: steeleops
    user: steeleops
    plan: starter

services:
  - type: web
    name: steeleops
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /login
    envVars:
      - key: APP_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: SESSION_COOKIE_SECURE
        value: 1
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: steeleops-db
          property: connectionString
