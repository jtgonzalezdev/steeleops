databases:
  - name: steeleops-db
    databaseName: steeleops
    user: steeleops
    plan: starter

services:
  - type: web
    name: steeleops
    runtime: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:${PORT:-10000}
    healthCheckPath: /login
    envVars:
      - key: APP_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: SESSION_COOKIE_SECURE
        value: 1
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: steeleops-db
          property: connectionString
